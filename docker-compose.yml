services:
  predictor:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    command: python live_predict.py --mode live --station ohangaron
    volumes:
      - state_data:/app/state

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "8000:8000"
    volumes:
      - state_data:/app/state
    depends_on:
      - predictor

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  state_data:
