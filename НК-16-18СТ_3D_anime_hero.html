<script type="module">
import * as THREE from 'three';
import { animate, createTimeline, createTimer, stagger, utils } from 'animejs';

THREE.ColorManagement.enabled = false;

/* ── Палитры (как в hero) ───────────────────────────────────────── */
const DARK = {
  backgroundColor:'#252423', outlineColor:'#101010',
  rimColor:'#ffc7a8', shadowColor:'#2e2828', worldColor1:'#706868',
  outlineBlend:0.4, contourBlend:0.65,
};
const LIGHT = {
  backgroundColor:'#DAD5D0', outlineColor:'#2a2520', worldColor1:'#b0a8a3',
  shadowColor:'#8a8280', rimColor:'#f5f1ed', outlineBlend:0.28, contourBlend:0.45,
};
const outlineMaterialParams = { verticesNormalMix:.08, rimThreshold:.7, rimAmount:.42 };
const outlinePassParams = {
  resolutionScale:4, threshold:.035, outlineThickness:1,
  outlineBlend:.4, contourBlend:.65, sourceMix:1, effectMix:1,
  backgroundMix:1, rimIntensity:1, shadowIntensity:1,
};

/* ── Рендерер ───────────────────────────────────────────────────── */
const viewportEl = document.getElementById('engine');
const renderer = new THREE.WebGLRenderer({ powerPreference:'high-performance', antialias:false, alpha:false, stencil:false });
renderer.setPixelRatio(1);
viewportEl.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const BASE_FOV = 40;
const camera = new THREE.PerspectiveCamera(BASE_FOV, 1, 1, 1000);
camera.position.z = 120;
camera.lookAt(scene.position);

let W=0, H=0;
const SS = window.devicePixelRatio > 2 ? 3 : 2;
let renderTarget = null;

/* ── Toon-материал с патчем (из hero) ───────────────────────────── */
const outlineMaterial = new THREE.MeshToonMaterial({ vertexColors:true, side: THREE.DoubleSide });
outlineMaterial.onBeforeCompile = (shader) => {
  shader.uniforms.verticesNormalMix = { value: outlineMaterialParams.verticesNormalMix };
  shader.uniforms.rimThreshold = { value: outlineMaterialParams.rimThreshold };
  shader.uniforms.rimAmount = { value: outlineMaterialParams.rimAmount };
  shader.vertexShader = shader.vertexShader.replace('void main() {', `
    varying vec3 vFixedNormal; varying vec3 vViewDir;
    void main() {
      vFixedNormal = normalize(normal);
      vViewDir = normalize(-(modelViewMatrix * vec4(position, 1.0)).xyz);
    `);
  shader.fragmentShader = `
    precision highp float;
    uniform float verticesNormalMix, rimThreshold, rimAmount;
    varying vec3 vFixedNormal, vViewDir;
    vec3 black=vec3(0,0,0),white=vec3(1,1,1),red=vec3(1,0,0),green=vec3(0,1,0),blue=vec3(0,0,1),
         pink=vec3(1,0,1),yellow=vec3(1,1,0),cyan=vec3(0,1,1),ui1=vec3(1,.5,0);
  ` + shader.fragmentShader;
  shader.fragmentShader = shader.fragmentShader.replace('#include <color_fragment>', '');
  shader.fragmentShader = shader.fragmentShader.replace('#include <opaque_fragment>', `#include <opaque_fragment>
    vec3 n = vFixedNormal;
    vec3 normalColor = vec3(.5*(1.+n.x), .5*(1.+n.y), .5*(1.+n.z));
    float NdotL  = dot(normalize(normal), normalize(directionalLights[0].direction));
    float rimDot = 1. - dot(vViewDir, normal);
    float rimPower = clamp(rimDot * pow(NdotL, rimThreshold), 0., 1.);
    float rimC = outgoingLight.r >= .95 ? rimPower-(1.-rimAmount) : .0;
    float lightC = outgoingLight.r < .95 ? .0 : 1.;
    float shadowsColor = lightC + clamp(rimC, -0.05, 0.);
    float mixNormal = verticesNormalMix;
    if(vColor.rgb==black||vColor.rgb==red||vColor.rgb==green||vColor.rgb==blue||
       vColor.rgb==pink||vColor.rgb==yellow||vColor.rgb==cyan||vColor.rgb==ui1) mixNormal=0.;
    if(vColor.r==0.0) normalColor.r=0.0; if(vColor.g==0.0) normalColor.g=0.0;
    if(vColor.b==0.0) normalColor.b=0.0; if(vColor.r==1.0) normalColor.r=1.0;
    if(vColor.g==1.0) normalColor.g=1.0; if(vColor.b==1.0) normalColor.b=1.0;
    float depth = gl_FragCoord.w*10.;
    mixNormal = clamp(mixNormal*depth, 0., verticesNormalMix);
    vec3 diffuse = mix(vColor.rgb, normalColor, mixNormal);
    gl_FragColor = vec4(diffuse, shadowsColor);
  `);
  outlineMaterial.userData.shader = shader;
};

/* ── Outline постпроцесс (из hero) ──────────────────────────────── */
const outlineShaderMaterial = new THREE.ShaderMaterial({
  vertexShader: `precision highp float; varying vec2 vUv;
    void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    precision highp float;
    #include <packing>
    varying vec2 vUv;
    uniform sampler2D tDiffuse;
    uniform float outlineThickness,outlineBlend,contourBlend,backgroundMix,threshold,sourceMix,effectMix,rimIntensity,shadowIntensity,materialMix;
    uniform vec2 resolution;
    uniform vec3 ambiantColor,backgroundColor,outlineColor,rimColor,shadowColor,worldColor1;
    void main(){
      vec4 td=texture2D(tDiffuse,vUv);
      vec3 inColor=td.rgb, lineColor=outlineColor;
      vec3 paintColor=mix(worldColor1,inColor,materialMix);
      vec3 toneColor=(vec3(td.a)*ambiantColor)+(ambiantColor*.25);
      float shadowTones=td.a, x=1./resolution.x, y=1./resolution.y;
      vec3 s0=texture2D(tDiffuse,vUv-vec2(x,y)*outlineThickness).rgb;
      vec3 s1=texture2D(tDiffuse,vUv+vec2(x,y)*outlineThickness).rgb;
      vec3 s2=texture2D(tDiffuse,vUv+vec2(x*outlineThickness,-y*outlineThickness)).rgb;
      vec3 s3=texture2D(tDiffuse,vUv+vec2(-x*outlineThickness,y*outlineThickness)).rgb;
      float edge=sqrt(dot(s1-s0,s1-s0)+dot(s3-s2,s3-s2));
      float outline=edge>threshold?1.:0.;
      vec3 outColor;
      if(inColor==vec3(1,1,1)){
        outColor=((1.-outline)*backgroundColor)+(outline*mix(outlineColor,backgroundColor,contourBlend));
      } else {
        if(shadowTones>=.95) paintColor=mix(paintColor,rimColor,rimIntensity*.4);
        else if(shadowTones<=.3) paintColor=mix(paintColor,shadowColor,shadowIntensity*.55);
        lineColor=mix(lineColor,paintColor,outlineBlend);
        outColor=((1.-outline)*mix(toneColor,paintColor,effectMix))+(outline*lineColor);
      }
      gl_FragColor=vec4(clamp(mix(inColor,outColor,sourceMix),0.,1.),1.);
    }`,
  uniforms: {
    tDiffuse:{value:null}, resolution:{value:new THREE.Vector2(1,1)},
    threshold:{value:outlinePassParams.threshold},
    outlineThickness:{value:outlinePassParams.outlineThickness},
    outlineBlend:{value:outlinePassParams.outlineBlend},
    contourBlend:{value:outlinePassParams.contourBlend},
    sourceMix:{value:outlinePassParams.sourceMix},
    effectMix:{value:outlinePassParams.effectMix},
    backgroundMix:{value:outlinePassParams.backgroundMix},
    ambiantColor:{value:new THREE.Color(0x706868)},
    backgroundColor:{value:new THREE.Color(DARK.backgroundColor)},
    outlineColor:{value:new THREE.Color(DARK.outlineColor)},
    rimColor:{value:new THREE.Color(DARK.rimColor)},
    rimIntensity:{value:outlinePassParams.rimIntensity},
    shadowColor:{value:new THREE.Color(DARK.shadowColor)},
    shadowIntensity:{value:outlinePassParams.shadowIntensity},
    materialMix:{value:.85},
    worldColor1:{value:new THREE.Color(DARK.worldColor1)},
  },
});
const quadScene = new THREE.Scene();
const quadCamera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
quadScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), outlineShaderMaterial));

function updateDimensions(){
  W = viewportEl.offsetWidth & ~1;
  H = viewportEl.offsetHeight & ~1;
  camera.aspect = W/H;
  camera.fov = BASE_FOV * ((H>=1000?H:1000)/1000);
  camera.updateProjectionMatrix();
  renderer.setSize(W,H);
  if (renderTarget) renderTarget.dispose();
  renderTarget = new THREE.WebGLRenderTarget(W*SS, H*SS, { depthBuffer:true });
  outlineShaderMaterial.uniforms.tDiffuse.value = renderTarget.texture;
  outlineShaderMaterial.uniforms.resolution.value.set(
    W*outlinePassParams.resolutionScale, H*outlinePassParams.resolutionScale);
}
updateDimensions();
window.addEventListener('resize', updateDimensions);

/* ── Obj-адаптер (из hero): anime.js анимирует THREE.Object3D ──── */
class Obj {
  constructor(o){ this.object3D=o; this._scale=1; this._opacity=1; }
  handleVisibility(){
    const v=!(!this._opacity||!this._scale||!this.scaleX||!this.scaleY||!this.scaleZ);
    this.object3D.visible=v; return v;
  }
  get x(){ return this.object3D.position.x; } set x(v){ this.object3D.position.x=v; }
  get y(){ return this.object3D.position.y; } set y(v){ this.object3D.position.y=v; }
  get z(){ return this.object3D.position.z; } set z(v){ this.object3D.position.z=v; }
  get rotateX(){ return THREE.MathUtils.radToDeg(this.object3D.rotation.x); }
  set rotateX(v){ this.object3D.rotation.x=THREE.MathUtils.degToRad(v); }
  get rotateY(){ return THREE.MathUtils.radToDeg(this.object3D.rotation.y); }
  set rotateY(v){ this.object3D.rotation.y=THREE.MathUtils.degToRad(v); }
  get rotateZ(){ return THREE.MathUtils.radToDeg(this.object3D.rotation.z); }
  set rotateZ(v){ this.object3D.rotation.z=THREE.MathUtils.degToRad(v); }
  get scale(){ return this._scale; }
  set scale(v){ this._scale=v; this.object3D.scale.setScalar(v); this.handleVisibility(); }
  get scaleX(){ return this.object3D.scale.x; } set scaleX(v){ this.object3D.scale.x=v; this.handleVisibility(); }
  get scaleY(){ return this.object3D.scale.y; } set scaleY(v){ this.object3D.scale.y=v; this.handleVisibility(); }
  get scaleZ(){ return this.object3D.scale.z; } set scaleZ(v){ this.object3D.scale.z=v; this.handleVisibility(); }
  get opacity(){ return this._opacity; }
  set opacity(v){ this._opacity=v; this.handleVisibility(); }
}
const $obj = (o) => new Obj(o);

/* ── Свет и корневые группы ─────────────────────────────────────── */
const rootGroup   = $obj(new THREE.Group());
const engineRoot  = $obj(new THREE.Group());
const ambientLight = new THREE.AmbientLight(0xffffff, 2);
const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
directionalLight.position.set(-200, 135, -80);
rootGroup.object3D.add(ambientLight, directionalLight, directionalLight.target, engineRoot.object3D);
scene.add(rootGroup.object3D);
engineRoot.scale = 7;

const minM = window.innerWidth >= 740;
rootGroup.z = minM ? 46 : 84;

/* ── Геометрия: помощники ───────────────────────────────────────── */
function vcol(geo, hex){
  const c=new THREE.Color(hex), n=geo.attributes.position.count;
  const a=new Float32Array(n*3);
  for(let i=0;i<n;i++){ a[i*3]=c.r; a[i*3+1]=c.g; a[i*3+2]=c.b; }
  geo.setAttribute('color', new THREE.BufferAttribute(a,3));
  return geo;
}
function mesh(parentObj, geo, hex, props){
  const m=new THREE.Mesh(vcol(geo,hex), outlineMaterial);
  const w=$obj(m); if(props) utils.set(w, props);
  parentObj.object3D.add(m); return w;
}
// цилиндр вдоль оси X: r1 — передний (-X) радиус, r2 — задний (+X)
const cylX = (r1,r2,len,open=false,seg=48)=> new THREE.CylinderGeometry(r1,r2,len,seg,1,open).rotateZ(Math.PI/2);
const flangeX = (R,t=.028)=> new THREE.TorusGeometry(R,t,12,48).rotateY(Math.PI/2);
const coneFwd = (r,len)=> new THREE.ConeGeometry(r,len,32).rotateZ(Math.PI/2);   // вершина к -X
const coneAft = (r,len)=> new THREE.ConeGeometry(r,len,32).rotateZ(-Math.PI/2);  // вершина к +X

// лопаточный венец вокруг оси X (InstancedMesh, перья с круткой); возвращает Obj группы
function bladeRing(parentObj, x, rIn, rOut, n, hex, chord=.13, thick=.032, twist=28){
  const g=$obj(new THREE.Group());
  g.x=x; parentObj.object3D.add(g.object3D);
  const bGeo=bladeGeo(rOut-rIn, chord, thick, twist, hex);
  radialInstances(g, bGeo, n, rIn, 0, 0, true);
  mesh(g, cylX(rIn+.02, rIn+.02, chord*.95, false, 24), '#878d93'); // ступица
  return g;
}
// корпус-оболочка с реальной толщиной стенки: профиль [осевая, радиус] наружной образующей
function shellX(prof, t=.035, hex='#8f969d', seg=64){
  const pts=[];
  for(const [a,r] of prof) pts.push(new THREE.Vector2(r, a));
  for(let i=prof.length-1;i>=0;i--) pts.push(new THREE.Vector2(Math.max(prof[i][1]-t,.02), prof[i][0]));
  pts.push(pts[0].clone());
  const g=new THREE.LatheGeometry(pts, seg);
  g.rotateZ(-Math.PI/2);
  return vcol(g, hex);
}
function shellMesh(parentObj, prof, t, hex, seg){
  const m=new THREE.Mesh(shellX(prof,t,hex,seg), outlineMaterial);
  const w=$obj(m); parentObj.object3D.add(m); return w;
}
// N экземпляров по окружности вокруг оси X (один draw call)
function radialInstances(parentObj, geo, n, R, x, phase=0, alignRadial=true){
  const im=new THREE.InstancedMesh(geo, outlineMaterial, n);
  const d=new THREE.Object3D();
  for(let i=0;i<n;i++){
    const a=Math.PI*2/n*i+phase;
    d.position.set(x, Math.cos(a)*R, Math.sin(a)*R);
    d.rotation.set(alignRadial?a:0, 0, 0);
    d.updateMatrix(); im.setMatrixAt(i, d.matrix);
  }
  im.instanceMatrix.needsUpdate=true;
  parentObj.object3D.add(im);
  return im;
}
// перо лопатки с круткой и сужением к периферии
function bladeGeo(span, chord, thick, twistDeg, hex, taper=.72){
  const tw=THREE.MathUtils.degToRad(twistDeg);
  const sec=(y,c,a)=>{
    const hx=c/2, hz=thick/2;
    const p=[[-hx,-hz],[hx*.9,-hz*.4],[hx,hz*.4],[-hx*.85,hz]];
    return p.map(([px,pz])=>[px*Math.cos(a)-pz*Math.sin(a), y, px*Math.sin(a)+pz*Math.cos(a)]);
  };
  const r=sec(0, chord, tw*.45), q=sec(span, chord*taper, -tw*.55);
  const v=[];
  const quads=[[r[0],r[1],q[1],q[0]],[r[1],r[2],q[2],q[1]],[r[2],r[3],q[3],q[2]],[r[3],r[0],q[0],q[3]],[q[0],q[1],q[2],q[3]],[r[3],r[2],r[1],r[0]]];
  for(const f of quads){ v.push(...f[0],...f[1],...f[2], ...f[0],...f[2],...f[3]); }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(v,3));
  g.computeVertexNormals();
  return vcol(g, hex);
}
function pipe(parentObj, points, r, hex){
  const curve=new THREE.CatmullRomCurve3(points.map(p=>new THREE.Vector3(...p)));
  return mesh(parentObj, new THREE.TubeGeometry(curve, 40, r, 10, false), hex);
}

/* ── Модули двигателя ───────────────────────────────────────────── */
const modules={};
for (const name of ['inlet','knd','mid','kvd','ks','tvd','tnd','st','exh'])
  { modules[name]=$obj(new THREE.Group()); engineRoot.object3D.add(modules[name].object3D); }

/* входное устройство */
shellMesh(modules.inlet, [[-3.5,1.17],[-3.44,1.12],[-3.34,1.05],[-3.18,1.0],[-2.96,.995],[-2.76,1.005],[-2.76,1.035],[-2.71,1.035]], .04, '#8e959c');

// подшипник качения: обоймы + сепаратор с шариками (вращается)
function bearing(parentObj, x, r, balls=10, ballR=.034){
  mesh(parentObj, new THREE.TorusGeometry(r+.05,.02,10,36).rotateY(Math.PI/2), '#9aa1a8', {x});
  mesh(parentObj, new THREE.TorusGeometry(r-.05,.018,10,36).rotateY(Math.PI/2), '#9aa1a8', {x});
  const cage=$obj(new THREE.Group()); cage.x=x; parentObj.object3D.add(cage.object3D);
  radialInstances(cage, vcol(new THREE.SphereGeometry(ballR,10,8), '#d6dade'), balls, r, 0, 0, false);
  mesh(cage, new THREE.TorusGeometry(r,.013,8,36).rotateY(Math.PI/2), '#c6cbd1'); // сепаратор
  return cage;
}
// шестерня: венец с зубьями вокруг оси X
function gear(parentObj, x, y, z, r, w, teeth, hex){
  const g=$obj(new THREE.Group());
  g.object3D.position.set(x,y,z); parentObj.object3D.add(g.object3D);
  mesh(g, new THREE.CylinderGeometry(r,r,w,28).rotateZ(Math.PI/2), hex);
  mesh(g, new THREE.CylinderGeometry(.035,.035,w*1.9,12).rotateZ(Math.PI/2), '#878d93');
  const tGeo=vcol(new THREE.BoxGeometry(w*1.04,.05,.042), hex);
  for(let i=0;i<teeth;i++){
    const h=new THREE.Group(); h.rotation.x=Math.PI*2/teeth*i;
    const t=new THREE.Mesh(tGeo, outlineMaterial); t.position.y=r+.02;
    h.add(t); g.object3D.add(h);
  }
  return g;
}

  labels.push({ name, li, dot, line, anchor, side, desc });

function buildExplodeTl(){
  explodeTl=createTimeline({ autoplay:false, defaults:{ease:'inOut(2)'} });
  const spread=[['inlet',-1.7],['knd',-1.05],['mid',-.55],['kvd',-.15],
                ['ks',.32],['tvd',.72],['tnd',1.08],['st',1.65],['exh',2.45]];
  explodeTl.add(rootGroup,{ z:(minM?60:104), duration:2500 },0);
  spread.forEach(([n,dx],i)=>{
    explodeTl.add(modules[n], { x:dx, duration:2200 }, 80*i);
  });
  // фаза 2: разнос по вертикали «ёлочкой» + отъезд камеры
  explodeTl.add(rootGroup,{ z:(minM?72:118), rotateX:'+=4', duration:2500 },2500);
  spread.forEach(([n],i)=>{
    explodeTl.add(modules[n], { y:(i%2? .55 : -.55), duration:2000 }, 2500+70*i);
  });
}

let savedRGx=0, savedRGy=0, savedRGz=0;
const focusLabelEl=document.getElementById('focus-label');
const focusDescEl=document.getElementById('focus-desc');

function focusModule(name){
  if(focusedModule===name){ unfocusModule(); return; }
  if(focusedModule){
    for(const [n,m] of Object.entries(modules)) utils.set(m,{scale:modBaseScale[n]});
  }else{
    savedRGx=rootGroup.x; savedRGy=rootGroup.y; savedRGz=rootGroup.z;
  }
  focusedModule=name;
  if(autoRotate) autoRotate.pause();
  const mod=modules[name];
  const wp=new THREE.Vector3();
  mod.object3D.getWorldPosition(wp);
  animate(rootGroup,{ x:rootGroup.x-wp.x, y:rootGroup.y-wp.y, z:rootGroup.z+30, duration:700, ease:'out(3)' });
  for(const [n,m] of Object.entries(modules)){
    if(n===name) animate(m,{scale:modBaseScale[n]*1.15,duration:700,ease:'out(3)'});
    else animate(m,{scale:0,duration:350,ease:'in(2)'});
  }
  for(const lb of labels){
    const own = lb.anchor.parent===modules[name].object3D;
    if(own){ animate([lb.li,lb.dot],{opacity:1,duration:250}); animate(lb.line,{opacity:.75,duration:250}); }
    else   { animate([lb.li,lb.dot,lb.line],{opacity:0,duration:200}); }
  }
  const lb=labels.find(l=>l.anchor.parent===modules[name].object3D);
  animate(sectionTitleEl,{opacity:0,duration:150});
  focusLabelEl.textContent=(lb?lb.name.toUpperCase():name.toUpperCase())+'  ·  клик — выход';
  focusDescEl.textContent=lb?lb.desc:'';
  animate(focusLabelEl,{opacity:1,duration:250});
  animate(focusDescEl,{opacity:.6,duration:250});
  if(gpaOn) animate(gpaGroup,{scale:0,duration:300,ease:'in(2)'});
  document.body.style.cursor='zoom-in';
}
function unfocusModule(){
  if(!focusedModule) return;
  focusedModule=null;
  animate(rootGroup,{x:savedRGx,y:savedRGy,z:savedRGz,duration:650,ease:'out(3)'});
  for(const [n,m] of Object.entries(modules))
    animate(m,{scale:modBaseScale[n],duration:550,ease:'out(3)'});
  for(const lb of labels){
    animate([lb.li,lb.dot],{opacity:1,duration:300});
    animate(lb.line,{opacity:.75,duration:300});
  }
  animate(focusLabelEl,{opacity:0,duration:200});
  animate(focusDescEl,{opacity:0,duration:200});
  if(gpaOn) animate(gpaGroup,{scale:1,duration:500,ease:'out(3)'});
  if(window.scrollY>20) animate(sectionTitleEl,{opacity:1,duration:250});
  document.body.style.cursor='';
  if(!autoRotate && window.scrollY<20) startAutoRotate();
}

/* ── Drag для вращения ──────────────────────────────────────────── */
let dragging=false, lastX=0, lastY=0;
let ptrDownX=0, ptrDownY=0, dragDist=0;

renderer.domElement.addEventListener('pointerdown',(e)=>{
  ptrDownX=e.clientX; ptrDownY=e.clientY; dragDist=0;
  if(tl.currentTime<3400) return;
  dragging=true; lastX=e.clientX; lastY=e.clientY;
  document.body.classList.add('dragging');
  if(autoRotate){ autoRotate.cancel(); autoRotate=null; }
});
window.addEventListener('pointermove',(e)=>{
  if(!dragging) return;
  const dx=e.clientX-ptrDownX, dy=e.clientY-ptrDownY;
  dragDist=Math.sqrt(dx*dx+dy*dy);
  rootGroup.rotateY += (e.clientX-lastX)*.35;
  rootGroup.rotateX += (e.clientY-lastY)*.35;
  lastX=e.clientX; lastY=e.clientY;
  if(focusedModule){
    rootGroup.object3D.updateWorldMatrix(true,true);
    const fwp=new THREE.Vector3();
    modules[focusedModule].object3D.getWorldPosition(fwp);
    rootGroup.x-=fwp.x; rootGroup.y-=fwp.y;
  }
});
window.addEventListener('pointerup',()=>{
  if(!dragging) return;
  dragging=false; document.body.classList.remove('dragging');
  if(!autoRotate && !focusedModule && window.scrollY<20) startAutoRotate();
});
renderer.domElement.addEventListener('click',(e)=>{
  if(dragDist>8) return;
  if(tl.currentTime<3400) return;
  const rect=renderer.domElement.getBoundingClientRect();
  mouseNDC.x= ((e.clientX-rect.left)/rect.width)*2-1;
  mouseNDC.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouseNDC,camera);
  const meshes=[];
  scene.traverse(o=>{ if(o.isMesh) meshes.push(o); });
  const hits=raycaster.intersectObjects(meshes,false);
  const name=hits.length?meshToMod.get(hits[0].object):null;
  name?focusModule(name):unfocusModule();
});

/* ── Рендер-цикл ────────────────────────────────────────────────── */
createTimer({ frameRate:60, onUpdate:()=>{
  renderer.setRenderTarget(renderTarget);
  renderer.render(scene,camera);
  renderer.setRenderTarget(null);
  renderer.render(quadScene,quadCamera);
  updateLabels();
}});
</script>
